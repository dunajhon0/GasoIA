name = "gasoia-worker"
main = "worker/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "gasoia.dunajhon.com/api/*", zone_name = "dunajhon.com" }
]

[triggers]
crons = ["0 */12 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "gasoia-db"
database_id = "5e4221ca-69e4-4c71-bf21-154395364b1f"

[vars]
ADSENSE_PUBLISHER_ID = ""
  SITE_URL = "https://gasoia.dunajhon.com"

[env.production]
name = "gasoia-worker"

  [env.production.vars]
  SITE_URL = "https://gasoia.dunajhon.com"

  [[env.production.d1_databases]]
  binding = "DB"
  database_name = "gasoia-db"
  database_id = "5e4221ca-69e4-4c71-bf21-154395364b1f"
